<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Workshop 2026</title>
</head>
<body>

    <!-- TECH-WORKSHOP-2026 -->

    <header>
        <h1>Tech Workshop 2026</h1>
        <p>Learn Coding, Design and Technology Skills!</p>
        <a href="#register">Register Now</a>
    </header>

    <section>
        <h2>Why Attend?</h2>
        <ul>
            <li>Hands-on Projects</li>
            <li>Expert Mentors</li>
            <li>Certificate of Participation</li>
        </ul>
    </section>

    <section>
        <h2>Workshop Highlights</h2>
        <img src="assets/workshop.jpg" alt="Workshop Image" width="300">
    </section>

    <section id="register">
        <h2>Registration Form</h2>

        <form>
            <p>Full Name:</p>
            <input type="text" placeholder="Enter your full name">

            <p>Email:</p>
            <input type="email" placeholder="Enter your email">

            <p>College:</p>
            <input type="text" placeholder="Enter your college name">

            <br><br>

            <button type="submit">Register</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Tech Workshop</p>
    </footer>

</body>
</html>
