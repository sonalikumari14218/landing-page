<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Camp</title>
</head>
<body>

    <!-- SUMMER-CAMP-2026-KEY -->

    <header>
        <h1>Summer Camp 2026</h1>
        <p>Learn, Explore, and Make New Friends!</p>
        <a href="#join">Join Now</a>
    </header>

    <section>
        <h2>Why Join?</h2>
        <ul>
            <li>Learn New Skills</li>
            <li>Build Self-Confidence</li>
            <li>Improve Physical and Mental Health</li>
        </ul>
    </section>

    <section>
        <h2>Camp Highlight</h2>
        <img src="assets/image.jpg" alt="Summer Camp Image" width="300">
    </section>

    <section id="join">
        <h2>Register</h2>
        <form>
            <p>Name:</p>
            <input type="text" placeholder="Enter your name">

            <p>Email:</p>
            <input type="email" placeholder="Enter your email">

            <p>Address:</p>
            <input type="address" placeholder="Enter your address">

            <br><br>
            <button type="submit">Join Camp</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Summer Camp</p>
    </footer>

</body>
</html>
